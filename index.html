<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İpekyol Market Otomasyonu - İndir</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Cam Efekti (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px rgba(255, 255, 255, 0.08) solid;
            padding: 3rem;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo-area {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #38bdf8, #0369a1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 2.5rem;
        }

        /* Havalı İndirme Butonu */
        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, #0284c7 0%, #0369a1 100%);
            color: white;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            border-radius: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(2, 132, 199, 0.5);
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        }

        .version-info {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        /* Arka Plan Süsleri */
        .circle {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(2,132,199,0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(40px);
            z-index: 1;
        }
        .circle-1 { top: -10%; left: -10%; width: 500px; height: 500px; }
        .circle-2 { bottom: -10%; right: -10%; width: 600px; height: 600px; }
    </style>
</head>
<body>

    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>

    <div class="card">
        <div class="logo-area">🛒</div>
        <h1>İpekyol Market</h1>
        <div class="subtitle">Otomasyon Sistemi v1.0 Kurulum Paketi</div>
        
        <a href="https://docs.google.com/uc?export=download&id=FILE_ID" class="download-btn">
            <span>🚀 Güvenli İndir (Windows)</span>
        </a>

        <div class="version-info">
            Boyut: ~ En son derlenen boyut | Sistem: Windows x86/x64
        </div>
    </div>

</body>
</html>
